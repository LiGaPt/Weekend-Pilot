<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WeekendPilot Current Version Technical Roadmap</title>
  <desc id="desc">A three-layer technical roadmap for WeekendPilot current version, showing the public demo chain, system layers, and supporting evidence stack.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1440" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8EE"/>
      <stop offset="0.55" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F6F0E3"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="120" y1="110" x2="1480" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF2D5" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#F7F7EC" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#E8F4EC" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="publicFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDF8E8"/>
      <stop offset="1" stop-color="#D8EFD1"/>
    </linearGradient>
    <linearGradient id="systemFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF5FB"/>
      <stop offset="1" stop-color="#D6E9F4"/>
    </linearGradient>
    <linearGradient id="supportFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8E9BE"/>
      <stop offset="1" stop-color="#F1D996"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#A48856" flood-opacity="0.10"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7D6751" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13" stroke="#5C8C58" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13" stroke="#4D819D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGold" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13" stroke="#AF8B36" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; }
      .title { font-size: 42px; font-weight: 800; fill: #3F352B; letter-spacing: 0.3px; }
      .subtitle { font-size: 18px; font-weight: 500; fill: #726456; }
      .band-title { font-size: 18px; font-weight: 800; letter-spacing: 1.4px; }
      .band-copy { font-size: 14px; fill: #6E6357; }
      .card-title { font-size: 24px; font-weight: 800; }
      .card-copy { font-size: 16px; fill: #584F47; }
      .mini { font-size: 14px; fill: #6B6257; }
      .pill { font-size: 13px; font-weight: 700; letter-spacing: 1px; }
      .num { font-size: 12px; font-weight: 800; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1600" height="920" rx="32" fill="url(#bg)"/>
  <rect x="28" y="28" width="1544" height="864" rx="30" stroke="#E3D5C4" stroke-width="2"/>
  <path d="M104 96C262 30 494 24 664 92C788 142 900 136 1064 78C1214 24 1388 38 1492 114V828H104V96Z" fill="url(#heroGlow)" opacity="0.8"/>
  <circle cx="1332" cy="122" r="74" fill="#FFF0C7" opacity="0.65"/>
  <circle cx="1320" cy="116" r="38" fill="#FFF7E2" opacity="0.95"/>

  <g filter="url(#shadow)">
    <rect x="72" y="64" width="1456" height="792" rx="28" fill="#FFFCF7" fill-opacity="0.78"/>
  </g>

  <text x="112" y="126" class="title">Current Version Technical Roadmap</text>
  <text x="112" y="156" class="subtitle">WeekendPilot README 主视觉 · 从公开演示主链读到系统分层，再落到底部支撑与证据层</text>

  <g transform="translate(112 190)">
    <rect x="0" y="0" width="132" height="34" rx="17" fill="#E8F2E0"/>
    <text x="66" y="22" text-anchor="middle" class="pill" fill="#5F8A56">PUBLIC CHAIN</text>
    <rect x="150" y="0" width="132" height="34" rx="17" fill="#E3EFF8"/>
    <text x="216" y="22" text-anchor="middle" class="pill" fill="#4E7F9C">SYSTEM LAYERS</text>
    <rect x="300" y="0" width="172" height="34" rx="17" fill="#F6E7BC"/>
    <text x="386" y="22" text-anchor="middle" class="pill" fill="#A27A22">SUPPORT + EVIDENCE</text>
  </g>

  <g transform="translate(94 250)">
    <rect x="0" y="0" width="1412" height="218" rx="28" fill="#FAF7F0" stroke="#DDD1C2" stroke-width="1.5"/>
    <rect x="18" y="18" width="1376" height="182" rx="22" fill="#FCFFF9" stroke="#DCEAD8"/>
    <text x="34" y="48" class="band-title" fill="#5B8855">TOP LAYER · 公开主链 / Public Demo Narrative</text>
    <text x="34" y="72" class="band-copy">评委先看到的是 `5173` 对外演示主链：规划、澄清与重规划、人工确认边界，再到执行结果。</text>

    <g filter="url(#softShadow)">
      <rect x="36" y="98" width="232" height="80" rx="22" fill="url(#publicFill)" stroke="#BFD6B7" stroke-width="2"/>
      <text x="60" y="132" class="card-title" fill="#4F7D49">5173 Public Demo</text>
      <text x="60" y="158" class="card-copy">公开入口 · Reviewer-facing 首页</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="308" y="88" width="270" height="100" rx="24" fill="url(#publicFill)" stroke="#BFD6B7" stroke-width="2"/>
      <text x="332" y="126" class="card-title" fill="#4F7D49">Planning Flow</text>
      <text x="332" y="150" class="card-copy">需求理解 / 候选生成 / itinerary draft</text>
      <text x="332" y="172" class="mini">system 先产出可审查方案，而不是直接写动作</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="618" y="88" width="246" height="100" rx="24" fill="url(#publicFill)" stroke="#BFD6B7" stroke-width="2"/>
      <text x="642" y="126" class="card-title" fill="#4F7D49">clarification / replan</text>
      <text x="642" y="150" class="card-copy">缺信息先追问，不合适就重新规划</text>
      <text x="642" y="172" class="mini">让主链对真实用户输入更稳</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="904" y="88" width="224" height="100" rx="24" fill="url(#publicFill)" stroke="#BFD6B7" stroke-width="2"/>
      <text x="928" y="126" class="card-title" fill="#4F7D49">Human Boundary</text>
      <text x="928" y="150" class="card-copy">confirm / decline before write</text>
      <text x="928" y="172" class="mini">人工确认是当前版本最关键的安全边界</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="1168" y="98" width="206" height="80" rx="22" fill="url(#publicFill)" stroke="#BFD6B7" stroke-width="2"/>
      <text x="1192" y="132" class="card-title" fill="#4F7D49">Execution Result</text>
      <text x="1192" y="158" class="card-copy">执行摘要 / final message</text>
    </g>

    <path d="M268 138H308" stroke="#5C8C58" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
    <path d="M578 138H618" stroke="#5C8C58" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
    <path d="M864 138H904" stroke="#5C8C58" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
    <path d="M1128 138H1168" stroke="#5C8C58" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  </g>

  <g transform="translate(94 492)">
    <rect x="0" y="0" width="1412" height="176" rx="28" fill="#F8FBFD" stroke="#CFDDE7" stroke-width="1.5"/>
    <text x="34" y="42" class="band-title" fill="#4E7F9C">MIDDLE LAYER · 系统分层 / Runtime and Delivery Layers</text>
    <text x="34" y="66" class="band-copy">这层解释主链为什么能稳定演示：前台呈现、API 编排、工作流决策、工具网关隔离，各层职责明确。</text>

    <g filter="url(#softShadow)">
      <rect x="34" y="92" width="300" height="56" rx="20" fill="url(#systemFill)" stroke="#BDD7E5" stroke-width="2"/>
      <text x="58" y="126" class="card-title" fill="#3F718D">Frontend Layer</text>
      <text x="214" y="126" class="card-copy">5173 / 5174 surfaces</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="378" y="92" width="300" height="56" rx="20" fill="url(#systemFill)" stroke="#BDD7E5" stroke-width="2"/>
      <text x="402" y="126" class="card-title" fill="#3F718D">API Layer</text>
      <text x="514" y="126" class="card-copy">public / internal / stream</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="722" y="92" width="300" height="56" rx="20" fill="url(#systemFill)" stroke="#BDD7E5" stroke-width="2"/>
      <text x="746" y="126" class="card-title" fill="#3F718D">Workflow Layer</text>
      <text x="908" y="126" class="card-copy">plan / clarify / confirm / execute</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="1066" y="92" width="312" height="56" rx="20" fill="url(#systemFill)" stroke="#BDD7E5" stroke-width="2"/>
      <text x="1090" y="126" class="card-title" fill="#3F718D">Gateway Layer</text>
      <text x="1236" y="126" class="card-copy">bounded tool + provider isolation</text>
    </g>

    <path d="M334 120H378" stroke="#4D819D" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
    <path d="M678 120H722" stroke="#4D819D" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
    <path d="M1022 120H1066" stroke="#4D819D" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  </g>

  <g transform="translate(94 690)">
    <rect x="0" y="0" width="1412" height="140" rx="28" fill="#FFF9EC" stroke="#E4D2A2" stroke-width="1.5"/>
    <text x="34" y="42" class="band-title" fill="#A27A22">BOTTOM LAYER · 支撑 / 数据 / 证据层</text>
    <text x="34" y="66" class="band-copy">底层不是直接面向用户的 UI，而是当前版本能被验证、能被审查、能被恢复复盘的支撑能力。</text>

    <g filter="url(#softShadow)">
      <rect x="34" y="86" width="246" height="34" rx="17" fill="url(#supportFill)" stroke="#D8BE72" stroke-width="1.8"/>
      <text x="157" y="108" text-anchor="middle" class="card-copy" fill="#7F6115">Mock World</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="302" y="86" width="286" height="34" rx="17" fill="url(#supportFill)" stroke="#D8BE72" stroke-width="1.8"/>
      <text x="445" y="108" text-anchor="middle" class="card-copy" fill="#7F6115">AMap read-only preview</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="610" y="86" width="224" height="34" rx="17" fill="url(#supportFill)" stroke="#D8BE72" stroke-width="1.8"/>
      <text x="722" y="108" text-anchor="middle" class="card-copy" fill="#7F6115">Observability</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="856" y="86" width="214" height="34" rx="17" fill="url(#supportFill)" stroke="#D8BE72" stroke-width="1.8"/>
      <text x="963" y="108" text-anchor="middle" class="card-copy" fill="#7F6115">Benchmark</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="1092" y="86" width="286" height="34" rx="17" fill="url(#supportFill)" stroke="#D8BE72" stroke-width="1.8"/>
      <text x="1235" y="108" text-anchor="middle" class="card-copy" fill="#7F6115">Recovery Review</text>
    </g>

    <path d="M280 103H302" stroke="#AF8B36" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <path d="M588 103H610" stroke="#AF8B36" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <path d="M834 103H856" stroke="#AF8B36" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <path d="M1070 103H1092" stroke="#AF8B36" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrowGold)"/>
  </g>

  <g opacity="0.92">
    <path d="M405 468C405 492 272 492 272 534" stroke="#9EBE96" stroke-width="3" stroke-dasharray="8 10"/>
    <path d="M754 468C754 492 528 492 528 534" stroke="#9EBE96" stroke-width="3" stroke-dasharray="8 10"/>
    <path d="M1016 468C1016 492 872 492 872 534" stroke="#9EBE96" stroke-width="3" stroke-dasharray="8 10"/>
    <path d="M1271 468C1271 492 1222 492 1222 534" stroke="#9EBE96" stroke-width="3" stroke-dasharray="8 10"/>

    <path d="M272 668C272 692 157 692 157 776" stroke="#89A8B7" stroke-width="3" stroke-dasharray="8 10"/>
    <path d="M528 668C528 692 445 692 445 776" stroke="#89A8B7" stroke-width="3" stroke-dasharray="8 10"/>
    <path d="M872 668C872 692 722 692 722 776" stroke="#89A8B7" stroke-width="3" stroke-dasharray="8 10"/>
    <path d="M1222 668C1222 692 1235 692 1235 776" stroke="#89A8B7" stroke-width="3" stroke-dasharray="8 10"/>
  </g>

  <g transform="translate(118 840)">
    <rect x="0" y="0" width="1364" height="24" rx="12" fill="#F3EBDD"/>
    <circle cx="20" cy="12" r="5" fill="#5F8A56"/>
    <text x="34" y="17" class="num" fill="#5A5044">GREEN = public user-facing chain</text>
    <circle cx="410" cy="12" r="5" fill="#4E7F9C"/>
    <text x="424" y="17" class="num" fill="#5A5044">BLUE = system responsibility layers</text>
    <circle cx="826" cy="12" r="5" fill="#A27A22"/>
    <text x="840" y="17" class="num" fill="#5A5044">GOLD = support, data, observability, benchmark evidence</text>
  </g>
</svg>
